 <!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXT LEVEL WIFI PRO | GOLD EDITION</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffcc00; --secondary: #d4af37; --bg-dark: #0f172a; --glass: rgba(30, 41, 59, 0.7); }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #020617; color: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; align-items: center; background-image: radial-gradient(at 0% 0%, rgba(212, 175, 55, 0.1) 0px, transparent 50%); }
        .logo-container { margin-top: 35px; width: 90px; height: 90px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 20px; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); transform: rotate(-5deg); border: 2px solid rgba(255,255,255,0.2); }
        .logo-text { font-family: 'Orbitron', sans-serif; font-size: 35px; font-weight: 900; color: #000; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; text-align: center; margin: 20px 0 5px 0; color: var(--primary); letter-spacing: 2px; text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        .backup-badge { background: #ffffff; color: #000; padding: 5px 15px; border-radius: 5px; font-weight: 800; font-size: 10px; margin-bottom: 25px; border: 1px solid var(--primary); }
        .card { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 25px; padding: 30px; width: 85%; max-width: 380px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); transition: 0.4s; }
        input, select, button { width: 100%; padding: 14px; margin: 12px 0; border-radius: 12px; border: none; font-size: 15px; font-family: inherit; }
        input { background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.1); }
        button { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #000; font-weight: 800; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }
        .call-btn { background: transparent; color: var(--primary); border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; text-decoration: none; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 14px; margin-top: 10px; }
        #admin-area { display: none; width: 100%; max-width: 400px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="logo-container"><span class="logo-text">NL</span></div>
    <h1>NEXT LEVEL WIFI</h1>
    <div class="backup-badge">⚡ 6HRS POWER BACKUP ⚡</div>
    <div class="card">
        <h3 style="margin:0; color:var(--primary); font-size:18px;">Agiza Internet Yako</h3>
        <input type="text" id="cust-name" placeholder="Jina Kamili">
        <input type="tel" id="cust-phone" placeholder="Namba ya WhatsApp">
        <select id="cust-pkg">
            <option value="Daily - 1000">Siku 1 - TZS 1,000</option>
            <option value="Weekly - 5000">Wiki 1 - TZS 5,000</option>
            <option value="Monthly - 15000">Mwezi 1 - TZS 15,000</option>
        </select>
        <button onclick="submitOrder()">AGIZA SASA</button>
        <a href="tel:0768129449" class="call-btn">📞 PIGA: 0768 129 449</a>
    </div>
    <button onclick="openAdmin()" style="background:none; color:#475569; border:none; font-size:11px; margin-top:30px;">DATABASE ACCESS</button>
    <div id="admin-area">
        <div class="card" style="border-color: #f8fafc;">
            <h3 style="color:#f8fafc; margin:0;">ADMIN PORTAL</h3>
            <input type="text" id="adm-n" placeholder="Jina">
            <input type="tel" id="adm-p" placeholder="Namba">
            <button onclick="addUser()" style="background:#f8fafc; color:#000;">SAJILI MTEJA</button>
            <div id="client-list" style="margin-top:15px;"></div>
        </div>
    </div>
<script>
    const WIFI_PASS = "07lg9999"; const ADMIN_PASS = "hans"; const ADMIN_PHONE = "255768129449";
    function openAdmin() { if(prompt("Admin PIN:") === ADMIN_PASS) { document.getElementById('admin-area').style.display = "block"; render(); } }
    function submitOrder() {
        const n = document.getElementById('cust-name').value; const p = document.getElementById('cust-phone').value; const k = document.getElementById('cust-pkg').value;
        if(!n || !p) return alert("Jaza taarifa!");
        let m = `🔥 *ORDER MPYA: NEXT LEVEL WIFI*\n\nNaitwa: ${n}\nNamba: ${p}\nKifurushi: ${k}`;
        window.open(`https://wa.me/${ADMIN_PHONE}?text=${encodeURIComponent(m)}`);
    }
    let db = JSON.parse(localStorage.getItem("nl_gold_db")) || [];
    function addUser() {
        const n = document.getElementById('adm-n').value; let p = document.getElementById('adm-p').value;
        if(!n || !p) return alert("Jaza jina na namba!"); if(p.startsWith('0')) p = '255' + p.substring(1);
        db.push({ name: n, phone: p }); localStorage.setItem("nl_gold_db", JSON.stringify(db)); render();
        let warning = `👑 *NEXT LEVEL WIFI - PREMIUM ACCESS* 👑\n\nKaribu *${n}*.\n🔑 *PASS:* ${WIFI_PASS}\n📞 *SUPPORT:* 0768129449\n⚠️ *SECURITY:* Mfumo unadhibiti kifaa chako. Usigawe password.`;
        window.open(`https://wa.me/${p}?text=${encodeURIComponent(warning)}`);
    }
    function render() {
        const l = document.getElementById('client-list'); l.innerHTML = "";
        db.forEach((u, i) => { l.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; margin-bottom:5px; font-size:11px; display:flex; justify-content:space-between;">${u.name} (${u.phone}) <button onclick="del(${i})" style="width:auto; background:red; padding:3px 8px; font-size:9px; color:white;">FUTA</button></div>`; });
    }
    function del(i) { db.splice(i, 1); localStorage.setItem("nl_gold_db", JSON.stringify(db)); render(); }
</script>
</body>
</html>
